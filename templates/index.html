<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 90%; max-width: 480px; box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2); text-align: center; position: relative; overflow: hidden; }
        h2 { font-size: 28px; font-weight: 700; margin-bottom: 25px; background: linear-gradient(90deg, #00f2fe, #4facfe, #ff0844, #ffb199); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; background: rgba(0, 0, 0, 0.2); color: #fff; outline: none; }
        
        /* Preview Card */
        #previewCard { display: none; background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.1); }
        #previewThumb { width: 70px; height: 90px; border-radius: 8px; object-fit: cover; }
        .preview-info { flex: 1; overflow: hidden; }
        .preview-uploader { font-size: 13px; color: #00f2fe; font-weight: bold; margin-bottom: 5px; }
        .preview-title { font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Progress Bar */
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.4s ease; }

        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: rgba(255, 255, 255, 0.1); cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>TikTok Downloader</h2>
    
    <input type="text" id="urlInput" placeholder="🔗 Dán link video TikTok vào đây..." autocomplete="off">
    
    <div id="previewCard" style="display: none;">
        <img id="previewThumb" src="" alt="Thumbnail">
        <div class="preview-info">
            <div class="preview-uploader" id="previewUploader">Loading...</div>
            <div class="preview-title" id="previewTitle">Đang lấy dữ liệu video...</div>
        </div>
    </div>

    <select id="qualitySelect">
        <option value="video">🎬 Tải Video (Chất lượng cao nhất)</option>
        <option value="audio">🎵 Chỉ tải Âm thanh (MP3)</option>
    </select>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <button id="downloadBtn" onclick="startDownload()">Tải Xuống Ngay</button>
    <div id="status"></div>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const previewCard = document.getElementById('previewCard');
    const previewThumb = document.getElementById('previewThumb');
    const previewUploader = document.getElementById('previewUploader');
    const previewTitle = document.getElementById('previewTitle');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    
    let typingTimer;

    // Tự động lấy Preview khi dán link
    urlInput.addEventListener('input', () => {
        clearTimeout(typingTimer);
        const url = urlInput.value.trim();
        if(url) {
            typingTimer = setTimeout(() => fetchPreview(url), 800);
        } else {
            previewCard.style.display = 'none';
        }
    });

    async function fetchPreview(url) {
        previewCard.style.display = 'flex';
        previewUploader.innerText = 'Đang quét link...';
        previewTitle.innerText = '';
        previewThumb.src = 'https://via.placeholder.com/70x90/24243e/00f2fe?text=...';

        try {
            const res = await fetch('/api/preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            if(data.success) {
                previewUploader.innerText = '@' + data.uploader;
                previewTitle.innerText = data.title;
                previewThumb.src = data.thumbnail;
            } else {
                previewCard.style.display = 'none';
            }
        } catch (e) { previewCard.style.display = 'none'; }
    }

    async function startDownload() {
        const url = urlInput.value.trim();
        const quality = document.getElementById('qualitySelect').value;
        const btn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('status');

        if (!url) {
            statusText.innerHTML = '<span style="color:#ff6b6b">⚠️ Vui lòng dán link!</span>';
            return;
        }

        btn.disabled = true;
        btn.innerText = "Đang xử lý...";
        progressContainer.style.display = "block";
        progressBar.style.width = "10%";
        statusText.innerHTML = '⏳ Đang kết nối máy chủ...';

        // Giả lập thanh tiến trình mượt mà
        let progress = 10;
        let simInterval = setInterval(() => {
            if(progress < 85) { progress += 5; progressBar.style.width = progress + '%'; }
        }, 800);

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, quality })
            });

            const data = await response.json();
            clearInterval(simInterval);

            if (response.ok && data.success) {
                progressBar.style.width = "100%";
                statusText.innerHTML = '<span style="color:#51cf66">✅ Đã xử lý xong! Đang tải về...</span>';
                
                setTimeout(() => {
                    window.location.href = data.download_url;
                    resetUI();
                }, 1000);
            } else {
                statusText.innerHTML = `<span style="color:#ff6b6b">❌ ${data.error}</span>`;
                resetUI();
            }
        } catch (error) {
            clearInterval(simInterval);
            statusText.innerHTML = '<span style="color:#ff6b6b">🔌 Mất kết nối!</span>';
            resetUI();
        }

        function resetUI() {
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "Tải Xuống Ngay";
                progressContainer.style.display = "none";
                progressBar.style.width = "0%";
            }, 2000);
        }
    }
</script>
</body>
</html>
